version: '3.9'

services:
  api:
    build: ./todo-app/
    ports:
      - "8000:8000"
    volumes:
      - ./todo-app/:/app
      - ./todo-app/static:/app/static
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres@db:5432/todo_db
      - DB_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: todo_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

secrets:
  db_password:
    file: ./todo-app/secrets/db_password.txt

volumes:
  postgres_data:
